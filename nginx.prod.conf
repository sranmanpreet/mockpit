# Production reverse-proxy configuration. Drop into /etc/nginx/conf.d/default.conf on a host that
# terminates TLS (Let's Encrypt is recommended). Replace ${MOCKPIT_HOST} with the public hostname
# at deploy time, e.g. via envsubst.

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 4m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;

    log_format json escape=json '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"reqid":"$http_x_request_id"}';
    access_log /var/log/nginx/access.log json;

    upstream mockpit_backend {
        server mockpit-server:8080;
        keepalive 32;
    }

    # HTTP -> HTTPS redirect.
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/${MOCKPIT_HOST}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${MOCKPIT_HOST}/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP is also set by the Spring Boot SecurityHeadersFilter; this is a defence-in-depth.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Static SPA.
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-store" always;
        }

        # Backend admin/auth API.
        location ~ ^/(native|auth|actuator|v3/api-docs|swagger-ui)/ {
            proxy_pass http://mockpit_backend;
        }

        # Live mock dispatcher catches everything else.
        location ~ ^/(?!assets/|.*\.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$) {
            proxy_pass http://mockpit_backend;
        }
    }
}

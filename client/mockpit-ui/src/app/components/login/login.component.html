<div class="auth-page">
  <div class="auth-card">
    <h2>Sign in to Mockpit</h2>
    <p class="muted">Manage your mocks and configure per-mock authentication.</p>
    <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="on">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" required minlength="12" />
      </label>
      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
    <p class="muted">Don't have an account? <a routerLink="/signup">Create one</a>.</p>
  </div>
</div>

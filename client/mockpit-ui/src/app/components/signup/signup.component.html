<div class="auth-page">
  <div class="auth-card">
    <h2>Create your Mockpit account</h2>
    <p class="muted">Free to start - private mocks, per-mock auth, dynamic JS responses.</p>
    <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="on">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="username" required />
      </label>
      <label>
        <span>Display name (optional)</span>
        <input type="text" formControlName="displayName" autocomplete="name" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="new-password" required minlength="12" />
        <small class="muted">At least 12 characters with upper, lower, and a digit.</small>
      </label>
      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>
    <p class="muted">Already have one? <a routerLink="/login">Sign in</a>.</p>
  </div>
</div>

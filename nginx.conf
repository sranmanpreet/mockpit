events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    server_tokens off;
    keepalive_timeout 65;
    client_max_body_size 4m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    log_format json escape=json '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"referer":"$http_referer",'
        '"ua":"$http_user_agent","reqid":"$http_x_request_id","upstream_ms":"$upstream_response_time"}';
    access_log /var/log/nginx/access.log json;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Static SPA assets - cache aggressively except index.html.
        location / {
            try_files $uri $uri/ /index.html;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        location = /index.html {
            add_header Cache-Control "no-store" always;
        }
    }
}
